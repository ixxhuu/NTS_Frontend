<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NTS Admin Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700&family=Barlow+Condensed:wght@700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --navy: #0d3a5c;
  --blue: #1a7ec8;
  --light-blue: #2fa8e0;
  --bg: #f0f4f8;
  --white: #fff;
  --text: #1a2b3c;
  --border: #dde8f2;
}
body { font-family: 'Barlow', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

/* ── LOGIN ── */
#login-screen {
  min-height: 100vh;
  display: flex; align-items: center; justify-content: center;
  background: var(--navy);
}
.login-box {
  background: #fff; border-radius: 8px;
  padding: 48px 40px; width: 100%; max-width: 400px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.3);
}
.login-logo {
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 32px; justify-content: center;
}
.login-logo svg { width: 36px; height: 36px; }
.login-logo span {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 20px; font-weight: 700; letter-spacing: 2px;
  color: var(--navy); text-transform: uppercase;
}
.login-box h2 {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 28px; font-weight: 800; color: var(--navy);
  text-transform: uppercase; margin-bottom: 24px; text-align: center;
}
.login-box input {
  width: 100%; padding: 12px 16px; margin-bottom: 14px;
  border: 1.5px solid var(--border); border-radius: 4px;
  font-family: 'Barlow', sans-serif; font-size: 14px; color: var(--text);
  outline: none; transition: border-color 0.2s;
}
.login-box input:focus { border-color: var(--light-blue); }
.login-btn {
  width: 100%; padding: 13px;
  background: var(--navy); color: #fff; border: none;
  border-radius: 4px; font-family: 'Barlow', sans-serif;
  font-size: 14px; font-weight: 700; letter-spacing: 1px;
  text-transform: uppercase; cursor: pointer;
  transition: background 0.2s;
}
.login-btn:hover { background: var(--blue); }
.login-error {
  color: #e74c3c; font-size: 13px; text-align: center;
  margin-top: 12px; display: none;
}

/* ── DASHBOARD ── */
#dashboard { display: none; }

.dash-nav {
  background: var(--navy); padding: 0 32px; height: 64px;
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 100;
}
.dash-nav-left {
  display: flex; align-items: center; gap: 10px;
}
.dash-nav-left svg { width: 28px; height: 28px; }
.dash-nav-left span {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 18px; font-weight: 700; letter-spacing: 2px;
  color: var(--light-blue); text-transform: uppercase;
}
.dash-nav span.admin-label {
  font-size: 12px; color: rgba(255,255,255,0.5);
  letter-spacing: 1px; text-transform: uppercase;
  font-family: 'Barlow', sans-serif; font-weight: 600;
}
.logout-btn {
  background: rgba(255,255,255,0.1); color: #fff;
  border: 1px solid rgba(255,255,255,0.2); padding: 7px 18px;
  border-radius: 3px; cursor: pointer; font-family: 'Barlow', sans-serif;
  font-size: 13px; font-weight: 600; letter-spacing: 0.5px;
  transition: background 0.2s;
}
.logout-btn:hover { background: rgba(255,255,255,0.2); }

.dash-body { padding: 32px; max-width: 1200px; margin: 0 auto; }

.dash-stats {
  display: grid; grid-template-columns: repeat(3, 1fr);
  gap: 20px; margin-bottom: 32px;
}
.stat-card {
  background: #fff; border-radius: 6px; padding: 24px;
  border-left: 4px solid var(--light-blue);
  box-shadow: 0 2px 12px rgba(0,0,0,0.06);
}
.stat-card h3 {
  font-size: 12px; font-weight: 600; letter-spacing: 1px;
  text-transform: uppercase; color: #8a9bb0; margin-bottom: 8px;
}
.stat-card p {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 40px; font-weight: 800; color: var(--navy);
}
.stat-card.pending { border-left-color: #f39c12; }
.stat-card.replied { border-left-color: #27ae60; }

.dash-filters {
  display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap;
}
.filter-btn {
  padding: 8px 18px; border-radius: 20px; border: 1.5px solid var(--border);
  background: #fff; color: var(--text); cursor: pointer;
  font-family: 'Barlow', sans-serif; font-size: 13px; font-weight: 600;
  transition: all 0.2s;
}
.filter-btn.active, .filter-btn:hover {
  background: var(--navy); color: #fff; border-color: var(--navy);
}

.enquiries-table {
  background: #fff; border-radius: 8px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.06); overflow: hidden;
}
.table-header {
  display: grid;
  grid-template-columns: 1.2fr 1fr 1.5fr 1fr 2fr 1fr 1fr;
  padding: 14px 20px; background: var(--navy);
  font-size: 11px; font-weight: 700; letter-spacing: 1px;
  text-transform: uppercase; color: rgba(255,255,255,0.7);
  gap: 12px;
}
.enquiry-row {
  display: grid;
  grid-template-columns: 1.2fr 1fr 1.5fr 1fr 2fr 1fr 1fr;
  padding: 16px 20px; border-bottom: 1px solid var(--border);
  gap: 12px; align-items: center; transition: background 0.2s;
}
.enquiry-row:hover { background: #f8fbff; }
.enquiry-row:last-child { border-bottom: none; }
.enquiry-row span { font-size: 13px; color: var(--text); }
.enquiry-row .msg {
  font-size: 12px; color: #6a7f8c;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.enquiry-row .date { font-size: 12px; color: #8a9bb0; }

.status-badge {
  display: inline-block; padding: 4px 10px; border-radius: 12px;
  font-size: 11px; font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase;
}
.status-badge.pending  { background: #fef3cd; color: #856404; }
.status-badge.read     { background: #cce5ff; color: #004085; }
.status-badge.replied  { background: #d4edda; color: #155724; }

.status-select {
  padding: 5px 8px; border-radius: 4px; border: 1.5px solid var(--border);
  font-family: 'Barlow', sans-serif; font-size: 12px; font-weight: 600;
  color: var(--text); cursor: pointer; outline: none;
  transition: border-color 0.2s;
}
.status-select:focus { border-color: var(--light-blue); }

.empty-state {
  text-align: center; padding: 60px 20px; color: #8a9bb0;
}
.empty-state p { font-size: 16px; margin-top: 8px; }

.loading {
  text-align: center; padding: 40px;
  color: #8a9bb0; font-size: 15px;
}
</style>
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
<link rel="manifest" href="/site.webmanifest">
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">
      <svg viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg">
        <circle cx="30" cy="30" r="26" fill="none" stroke="#2fa8e0" stroke-width="5"/>
        <circle cx="30" cy="30" r="6" fill="#2fa8e0"/>
        <rect x="27.5" y="4" width="5" height="18" rx="2.5" fill="#2fa8e0"/>
        <rect x="27.5" y="4" width="5" height="18" rx="2.5" fill="#2fa8e0" transform="rotate(120 30 30)"/>
        <rect x="27.5" y="4" width="5" height="18" rx="2.5" fill="#2fa8e0" transform="rotate(240 30 30)"/>
      </svg>
      <span>NTS Workholding</span>
    </div>
    <h2>Admin Login</h2>
    <input type="text" id="login-username" placeholder="Username">
    <input type="password" id="login-password" placeholder="Password">
    <button class="login-btn" id="login-btn">Login</button>
    <p class="login-error" id="login-error">Invalid username or password</p>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard">
  <nav class="dash-nav">
    <div class="dash-nav-left">
      <svg viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg">
        <circle cx="30" cy="30" r="26" fill="none" stroke="#2fa8e0" stroke-width="5"/>
        <circle cx="30" cy="30" r="6" fill="#2fa8e0"/>
        <rect x="27.5" y="4" width="5" height="18" rx="2.5" fill="#2fa8e0"/>
        <rect x="27.5" y="4" width="5" height="18" rx="2.5" fill="#2fa8e0" transform="rotate(120 30 30)"/>
        <rect x="27.5" y="4" width="5" height="18" rx="2.5" fill="#2fa8e0" transform="rotate(240 30 30)"/>
      </svg>
      <span>NTS Admin</span>
      <span class="admin-label" style="margin-left:16px;">Dashboard</span>
    </div>
    <button class="logout-btn" id="logout-btn">Logout</button>
  </nav>

  <div class="dash-body">
    <!-- Stats -->
    <div class="dash-stats">
      <div class="stat-card">
        <h3>Total Enquiries</h3>
        <p id="stat-total">0</p>
      </div>
      <div class="stat-card pending">
        <h3>Pending</h3>
        <p id="stat-pending">0</p>
      </div>
      <div class="stat-card replied">
        <h3>Replied</h3>
        <p id="stat-replied">0</p>
      </div>
    </div>

    <!-- Filters -->
    <div class="dash-filters">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="pending">Pending</button>
      <button class="filter-btn" data-filter="read">Read</button>
      <button class="filter-btn" data-filter="replied">Replied</button>
    </div>

    <!-- Table -->
    <div class="enquiries-table">
      <div class="table-header">
        <span>Name</span>
        <span>Company</span>
        <span>Email</span>
        <span>Phone</span>
        <span>Message</span>
        <span>Date</span>
        <span>Status</span>
      </div>
      <div id="enquiries-list">
        <div class="loading">Loading enquiries...</div>
      </div>
    </div>
  </div>
</div>

<script>
  const API = 'https://nts-backend-5hoc.onrender.com/api';
  let allEnquiries = [];
  let currentFilter = 'all';

  // ── LOGIN ──
  document.getElementById('login-btn').addEventListener('click', async () => {
    const username = document.getElementById('login-username').value.trim();
    const password = document.getElementById('login-password').value.trim();
    const errorEl = document.getElementById('login-error');
    errorEl.style.display = 'none';

    try {
      const res = await fetch(`${API}/admin/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });
      const data = await res.json();
      if (data.success) {
        localStorage.setItem('nts_token', data.token);
        showDashboard();
      } else {
        errorEl.style.display = 'block';
      }
    } catch {
      errorEl.textContent = 'Could not connect to server';
      errorEl.style.display = 'block';
    }
  });

  // Enter key on login
  document.getElementById('login-password').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('login-btn').click();
  });

  // ── LOGOUT ──
  document.getElementById('logout-btn').addEventListener('click', () => {
    localStorage.removeItem('nts_token');
    document.getElementById('dashboard').style.display = 'none';
    document.getElementById('login-screen').style.display = 'flex';
  });

  // ── CHECK TOKEN ON LOAD ──
  window.addEventListener('DOMContentLoaded', () => {
    const token = localStorage.getItem('nts_token');
    if (token) showDashboard();
  });

  // ── SHOW DASHBOARD ──
  function showDashboard() {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    loadEnquiries();
  }

  // ── LOAD ENQUIRIES ──
  async function loadEnquiries() {
    const token = localStorage.getItem('nts_token');
    try {
      const res = await fetch(`${API}/admin/enquiries`, {
        headers: { 'Authorization': `Bearer ${token}` }
      });
      if (res.status === 401) {
        localStorage.removeItem('nts_token');
        location.reload();
        return;
      }
      allEnquiries = await res.json();
      updateStats();
      renderEnquiries();
    } catch {
      document.getElementById('enquiries-list').innerHTML =
        '<div class="empty-state"><p>Could not load enquiries</p></div>';
    }
  }

  // ── STATS ──
  function updateStats() {
    document.getElementById('stat-total').textContent = allEnquiries.length;
    document.getElementById('stat-pending').textContent =
      allEnquiries.filter(e => e.status === 'pending').length;
    document.getElementById('stat-replied').textContent =
      allEnquiries.filter(e => e.status === 'replied').length;
  }

  // ── RENDER ──
  function renderEnquiries() {
    const filtered = currentFilter === 'all'
      ? allEnquiries
      : allEnquiries.filter(e => e.status === currentFilter);

    const list = document.getElementById('enquiries-list');

    if (filtered.length === 0) {
      list.innerHTML = '<div class="empty-state"><p>No enquiries found</p></div>';
      return;
    }

    list.innerHTML = filtered.map(e => `
      <div class="enquiry-row">
        <span>${e.name}</span>
        <span>${e.company || '—'}</span>
        <span>${e.email}</span>
        <span>${e.phone}</span>
        <span class="msg" title="${e.message}">${e.message}</span>
        <span class="date">${new Date(e.createdAt).toLocaleDateString('en-IN')}</span>
        <select class="status-select" data-id="${e._id}" onchange="updateStatus(this)">
          <option value="pending"  ${e.status==='pending' ?'selected':''}>Pending</option>
          <option value="read"     ${e.status==='read'    ?'selected':''}>Read</option>
          <option value="replied"  ${e.status==='replied' ?'selected':''}>Replied</option>
        </select>
      </div>
    `).join('');
  }

  // ── FILTERS ──
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentFilter = btn.dataset.filter;
      renderEnquiries();
    });
  });

  // ── UPDATE STATUS ──
  async function updateStatus(select) {
    const token = localStorage.getItem('nts_token');
    const id = select.dataset.id;
    const status = select.value;
    try {
      await fetch(`${API}/admin/enquiries/${id}`, {
        method: 'PATCH',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${token}`
        },
        body: JSON.stringify({ status })
      });
      const enquiry = allEnquiries.find(e => e._id === id);
      if (enquiry) enquiry.status = status;
      updateStats();
    } catch {
      alert('Failed to update status');
    }
  }
</script>
</body>
</html>
